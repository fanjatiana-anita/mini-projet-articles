version: '3.9'

services:

  # ── Base de données PostgreSQL ────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: iran_news_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       iran_news
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: secret
    volumes:
      - db_data:/var/lib/postgresql/data
      # Init automatique : script.sql (tables) puis data.sql (données)
      - ./database/script.sql:/docker-entrypoint-initdb.d/01-script.sql:ro
      - ./database/data.sql:/docker-entrypoint-initdb.d/02-data.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d iran_news"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Application PHP + Apache ──────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: iran_news_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST:     db
      DB_PORT:     5432
      DB_NAME:     iran_news
      DB_USER:     postgres
      DB_PASSWORD: secret
      # BASE_URL vide = à la racine du conteneur (http://localhost:8080)
      BASE_URL:    ""
    volumes:
      # Persiste les images uploadées entre les redémarrages
      - uploads_data:/var/www/html/public/images
    ports:
      - "8080:80"

volumes:
  db_data:
  uploads_data:
